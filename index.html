<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Patrol Log - Mall 23Semarang</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f6f9;
            color: #1e293b;
            padding: 1rem 0;
        }
        .main-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.06);
            border: none;
            max-width: 480px;
            margin: 0 auto;
        }
        .card-header-navy {
            background-color: #0b132b;
            color: white;
            padding: 2.5rem 1.5rem;
            text-align: center;
            border-bottom: 4px solid #0056b3;
        }
        .card-header-navy h4 {
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-size: 1.4rem;
        }
        .card-header-navy p {
            font-size: 0.85rem;
            opacity: 0.7;
            margin: 0;
        }
        .card-body-content {
            padding: 2rem 1.5rem;
        }
        .form-label-custom {
            font-weight: 600;
            font-size: 0.9rem;
            color: #334155;
            display: block;
            text-align: center;
            margin-bottom: 0.6rem;
        }
        .form-select-custom, .form-control-custom {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            text-align: center;
            text-align-last: center;
            color: #64748b;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .form-select-custom:focus {
            border-color: #0b132b;
            box-shadow: none;
            background-color: white;
        }
        .btn-camera {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.75rem;
            width: 100%;
            color: #0056b3;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .btn-camera:hover {
            background-color: #f1f5f9;
        }
        .status-gps-box {
            background-color: #edf7ed;
            color: #1e4620;
            border-radius: 12px;
            padding: 0.75rem;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid #d3eafd;
        }
        .status-gps-box.loading {
            background-color: #fff8ec;
            color: #b78103;
            border-color: #fff1d6;
        }
        .btn-submit-navy {
            background-color: #0b132b;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .btn-submit-navy:hover {
            background-color: #1c2541;
            color: white;
        }
        .btn-refresh-circle {
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #334155;
            transition: all 0.2s;
        }
        .btn-refresh-circle:hover {
            background-color: #f8fafc;
        }
        #fileFoto {
            display: none;
        }
        .preview-img-container {
            text-align: center;
            margin-top: 0.5rem;
        }
        .preview-img-tag {
            max-height: 120px;
            border-radius: 8px;
            border: 2px dashed #cbd5e1;
            padding: 4px;
        }
        
        /* WATERMARK FOOTER STYLE */
        .dev-watermark {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 1.5rem;
            line-height: 1.4;
        }
        .dev-watermark a {
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
        }
        
        .modal-success-content {
            border-radius: 20px;
            border: none;
            overflow: hidden;
        }
        .success-icon-animation {
            font-size: 4rem;
            color: #2ec4b6;
            animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes scaleUp {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-card">
            <!-- HEADER NAVY -->
            <div class="card-header-navy">
                <h4>DIGITAL PATROL LOG</h4>
                <p>Sistem Pelaporan Area Kerja • Mall 23Semarang</p>
            </div>

            <!-- FORM ISI CONTENT -->
            <div class="card-body-content">
                <form id="formPatroli">
                    
                    <div class="mb-4">
                        <label class="form-label-custom">Nama Petugas</label>
                        <select id="namaPetugas" class="form-select form-select-custom" required>
                            <option value="">Pilih Nama Personel</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-custom">Zona Inspeksi</label>
                        <select id="zonaArea" class="form-select form-select-custom" required>
                            <option value="">Pilih Titik Sektor</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-custom">Kondisi Sektor</label>
                        <select id="kondisiSektor" class="form-select form-select-custom" required>
                            <option value="">Pilih Kondisi Sektor</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-custom">Dokumentasi Visual</label>
                        <button type="button" class="btn-camera" onclick="picuInputKameraHP()">
                            <i class="fa-solid fa-camera text-primary"></i> <span id="textTombolKamera">Buka Kamera Perangkat</span>
                        </button>
                        <input type="file" id="fileFoto" accept="image/*" capture="environment" onchange="prosesPratinjauFoto(this)">
                        <div class="preview-img-container d-none" id="boxPreviewFoto">
                            <img src="" id="imgTargetPreview" class="preview-img-tag">
                        </div>
                    </div>

                    <div class="mb-4">
                        <div id="gpsStatusBox" class="status-gps-box loading">
                            <i id="gpsIcon" class="fa-solid fa-circle-notch fa-spin"></i> 
                            <span id="gpsTextStatus">Menghubungkan Otorisasi GPS...</span>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn-refresh-circle" onclick="location.reload()" title="Reset Form">
                            <i class="fa-solid fa-rotate"></i>
                        </button>
                        <button type="submit" id="btnSubmit" class="btn btn-submit-navy w-100" disabled>
                            Kirim Log Laporan
                        </button>
                    </div>

                </form>
                
                <!-- WATERMARK DEVELOPER -->
                <div class="dev-watermark">
                    <div>Developed by <strong>Alif Rizal</strong> • IT Department</div>
                    <div><i class="fa-regular fa-envelope me-1"></i><a href="mailto:alif.rizal@23semarang.id">alif.rizal@23semarang.id</a></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL POP-UP NOTIFIKASI SUKSES MODERN -->
    <div class="modal fade" id="modalSukses" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content modal-success-content p-4 text-center">
                <div class="mb-3">
                    <i class="fa-solid fa-circle-check success-icon-animation"></i>
                </div>
                <h5 class="fw-bold text-dark mb-1">Laporan Terkirim!</h5>
                <p class="text-muted small mb-4">Data log patroli berhasil dicatat ke sistem pusat secara real-time.</p>
                <button type="button" class="btn btn-dark w-100 py-2 rounded-3 fw-semibold" onclick="selesaiDanReload()">
                    Selesai & Lanjutkan
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL_WEBAPP = "https://script.google.com/macros/s/AKfycbyJuzwTGe-bucxDG6Yvgp-GEEsk5RdUpjR7ZX-G6KL_PlkiAn6QhustBE5n2fWBVrmA/exec";
        let modalKontrol;

        document.addEventListener("DOMContentLoaded", function() {
            modalKontrol = new bootstrap.Modal(document.getElementById('modalSukses'));

            fetch(`${API_URL_WEBAPP}?aksi=ambilDropdown`)
            .then(res => res.json())
            .then(data => {
                const selectNama = document.getElementById('namaPetugas');
                const selectZona = document.getElementById('zonaArea');
                const selectKondisi = document.getElementById('kondisiSektor');
                
                if(data.daftarNama) data.daftarNama.forEach(n => selectNama.innerHTML += `<option value="${n}">${n}</option>`);
                if(data.daftarZona) data.daftarZona.forEach(z => selectZona.innerHTML += `<option value="${z}">${z}</option>`);
                if(data.daftarKondisi) data.daftarKondisi.forEach(k => selectKondisi.innerHTML += `<option value="${k}">${k}</option>`);
            })
            .catch(err => {
                console.log("Gagal sinkronisasi dropdown");
            });
            
            aktifkanSistemGeotaggingGPS();
        });

        function picuInputKameraHP() {
            document.getElementById('fileFoto').click();
        }

        function prosesPratinjauFoto(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('textTombolKamera').innerText = "Foto Berhasil Dilampirkan";
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imgTargetPreview').src = e.target.result;
                    document.getElementById('boxPreviewFoto').classList.remove('d-none');
                }
                reader.readAsDataURL(file);
            }
        }

        function aktifkanSistemGeotaggingGPS() {
            const box = document.getElementById('gpsStatusBox');
            const icon = document.getElementById('gpsIcon');
            const text = document.getElementById('gpsTextStatus');
            const btnKirim = document.getElementById('btnSubmit');

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    window.latCoordinate = pos.coords.latitude;
                    window.lngCoordinate = pos.coords.longitude;
                    
                    box.classList.remove('loading');
                    icon.className = "fa-solid fa-location-dot text-success";
                    text.innerText = "Lokasi GPS Berhasil Diotorisasi";
                    btnKirim.disabled = false;
                }, err => {
                    box.className = "status-gps-box text-danger bg-danger bg-opacity-10 border-danger";
                    icon.className = "fa-solid fa-triangle-exclamation";
                    text.innerText = "Izin GPS Diperlukan Lapangan!";
                    btnKirim.disabled = false;
                }, { enableHighAccuracy: true });
            } else {
                text.innerText = "Gps Tidak Didukung Browser";
            }
        }

        document.getElementById('formPatroli').addEventListener('submit', function(e) {
            e.preventDefault();
            const tombol = document.getElementById('btnSubmit');
            tombol.disabled = true;
            tombol.innerHTML = `<i class="fa-solid fa-spinner fa-spin me-2"></i>Mengirim...`;

            const fileKomponen = document.getElementById('fileFoto').files[0];
            
            if(!fileKomponen) {
                alert("Wajib mengambil foto dokumentasi terlebih dahulu!");
                tombol.disabled = false;
                tombol.innerHTML = "Kirim Log Laporan";
                return;
            }

            const pembacaFile = new FileReader();
            pembacaFile.onload = function(event) {
                const base64FormatData = event.target.result.split(',')[1];
                
                const paketKirim = {
                    aksi: "simpanData",
                    payload: {
                        nama: document.getElementById('namaPetugas').value,
                        zona: document.getElementById('zonaArea').value,
                        kondisi: document.getElementById('kondisiSektor').value,
                        fotoBase64: base64FormatData,
                        fotoMime: fileKomponen.type,
                        lat: window.latCoordinate || "-",
                        lng: window.lngCoordinate || "-"
                    }
                };

                fetch(API_URL_WEBAPP, {
                    method: "POST",
                    body: JSON.stringify(paketKirim)
                })
                .then(res => res.json())
                .then(hasil => {
                    if(hasil.status === "SUCCESS") {
                        modalKontrol.show();
                    } else {
                        alert("Gagal: " + hasil.message);
                        tombol.disabled = false;
                        tombol.innerHTML = "Kirim Log Laporan";
                    }
                })
                .catch(err => {
                    alert("Koneksi internet bermasalah!");
                    tombol.disabled = false;
                    tombol.innerHTML = "Kirim Log Laporan";
                });
            };
            pembacaFile.readAsDataURL(fileKomponen);
        });

        function selesaiDanReload() {
            location.reload();
        }
    </script>
</body>
</html>
