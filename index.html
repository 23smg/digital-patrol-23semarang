<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Patrol Log - Mall 23Semarang</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f6f9;
            color: #1e293b;
            padding: 1rem 0;
        }
        .main-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.06);
            border: none;
            max-width: 480px;
            margin: 0 auto;
        }
        .card-header-navy {
            background-color: #0b132b;
            color: white;
            padding: 2.5rem 1.5rem;
            text-align: center;
            border-bottom: 4px solid #0056b3;
        }
        .card-header-navy h4 {
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-size: 1.4rem;
        }
        .card-header-navy p {
            font-size: 0.85rem;
            opacity: 0.7;
            margin: 0;
        }
        .card-body-content {
            padding: 2rem 1.5rem;
        }
        .form-label-custom {
            font-weight: 600;
            font-size: 0.9rem;
            color: #334155;
            display: block;
            text-align: center;
            margin-bottom: 0.6rem;
        }
        .form-select-custom, .form-control-custom {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            text-align: center;
            text-align-last: center;
            color: #1e293b;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .form-select-custom:focus, .form-control-custom:focus {
            border-color: #0b132b;
            box-shadow: none;
            background-color: white;
        }
        
        /* STYLE DROPDOWN KUSTOM ANTI EMULATOR HP */
        .wadah-pencarian-kustom {
            position: relative;
        }
        .box-hasil-kustom {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #0b132b;
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1050;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 4px;
        }
        .item-list-kustom {
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            color: #334155;
            cursor: pointer;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
        }
        .item-list-kustom:hover {
            background-color: #0b132b;
            color: white;
        }
        .item-list-kustom.tidak-ada {
            color: #94a3b8;
            font-style: italic;
        }

        .btn-camera {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.75rem;
            width: 100%;
            color: #0056b3;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .btn-camera:hover {
            background-color: #f1f5f9;
        }
        .status-gps-box {
            background-color: #edf7ed;
            color: #1e4620;
            border-radius: 12px;
            padding: 0.75rem;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid #d3eafd;
        }
        .status-gps-box.loading {
            background-color: #fff8ec;
            color: #b78103;
            border-color: #fff1d6;
        }
        .btn-submit-navy {
            background-color: #0b132b;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .btn-submit-navy:hover {
            background-color: #1c2541;
            color: white;
        }
        .btn-refresh-circle {
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #334155;
            transition: all 0.2s;
        }
        .btn-refresh-circle:hover {
            background-color: #f8fafc;
        }
        #fileFoto {
            display: none;
        }
        .preview-img-container {
            text-align: center;
            margin-top: 0.5rem;
        }
        .preview-img-tag {
            max-height: 120px;
            border-radius: 8px;
            border: 2px dashed #cbd5e1;
            padding: 4px;
        }
        .dev-watermark {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 1.5rem;
            line-height: 1.4;
        }
        .dev-watermark a {
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
        }
        .swal2-popup {
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            border-radius: 20px !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-card">
            <div class="card-header-navy">
                <h4>DIGITAL PATROL LOG</h4>
                <p>Sistem Pelaporan Area Kerja • Mall 23Semarang</p>
            </div>

            <div class="card-body-content">
                <form id="formPatroli">
                    
                    <div class="mb-4 wadah-pencarian-kustom">
                        <label class="form-label-custom">Nama Petugas (Ketik Untuk Mencari)</label>
                        <input type="text" id="namaPetugasInput" class="form-control form-control-custom w-100" placeholder="Cari nama personel di sini..." required autocomplete="off" oninput="filterNamaLive(this.value)" onfocus="tampilkanBoxNama()">
                        <div id="boxHasilNama" class="box-hasil-kustom"></div>
                    </div>

                    <div class="mb-4 wadah-pencarian-kustom">
                        <label class="form-label-custom">Zona Inspeksi (Ketik Untuk Mencari)</label>
                        <input type="text" id="zonaAreaInput" class="form-control form-control-custom w-100" placeholder="Cari titik sektor/area di sini..." required autocomplete="off" oninput="filterZonaLive(this.value)" onfocus="tampilkanBoxZona()">
                        <div id="boxHasilZona" class="box-hasil-kustom"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-custom">Kondisi Sektor</label>
                        <select id="kondisiSektor" class="form-select form-select-custom" required>
                            <option value="">Pilih Kondisi Sektor</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-custom">Catatan / Temuan Lapangan</label>
                        <textarea id="catatanPetugas" class="form-control form-control-custom w-100" rows="3" placeholder="Tulis rincian kondisi atau temuan jika ada... (Opsional)" style="text-align: left; text-align-last: left; border-radius: 12px; resize: none;"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-custom">Dokumentasi Visual</label>
                        <button type="button" class="btn-camera" onclick="picuInputKameraHP()">
                            <i class="fa-solid fa-camera text-primary"></i> <span id="textTombolKamera">Buka Kamera Perangkat</span>
                        </button>
                        <input type="file" id="fileFoto" accept="image/*" capture="environment" onchange="prosesPratinjauFoto(this)">
                        <div class="preview-img-container d-none" id="boxPreviewFoto">
                            <img src="" id="imgTargetPreview" class="preview-img-tag">
                        </div>
                    </div>

                    <div class="mb-4">
                        <div id="gpsStatusBox" class="status-gps-box loading">
                            <i id="gpsIcon" class="fa-solid fa-circle-notch fa-spin"></i> 
                            <span id="gpsTextStatus">Menghubungkan Otorisasi GPS...</span>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn-refresh-circle" onclick="location.reload()" title="Reset Form">
                            <i class="fa-solid fa-rotate"></i>
                        </button>
                        <button type="submit" id="btnSubmit" class="btn btn-submit-navy w-100" disabled>
                            Kirim Log Laporan
                        </button>
                    </div>

                </form>
                
                <div class="dev-watermark">
                    <div>Developed by <strong>Alif Rizal</strong> • IT Department</div>
                    <div><i class="fa-regular fa-envelope me-1"></i><a href="mailto:alif.rizal@23semarang.id">alif.rizal@23semarang.id</a></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const API_URL_WEBAPP = "https://script.google.com/macros/s/AKfycbyJuzwTGe-bucxDG6Yvgp-GEEsk5RdUpjR7ZX-G6KL_PlkiAn6QhustBE5n2fWBVrmA/exec";
        let GAMBAR_TERKOMPRES_BASE64 = ""; 
        let STATUS_GPS_VALID = false; 
        let DAFTAR_NAMA_MASTER = []; 
        let DAFTAR_ZONA_MASTER = []; 

        document.addEventListener("DOMContentLoaded", function() {
            fetch(`${API_URL_WEBAPP}?aksi=ambilDropdown`)
            .then(res => res.json())
            .then(data => {
                const selectKondisi = document.getElementById('kondisiSektor');
                
                if(data.daftarNama) {
                    DAFTAR_NAMA_MASTER = data.daftarNama;
                    buatUlangListNama(DAFTAR_NAMA_MASTER);
                }
                
                if(data.daftarZona) {
                    DAFTAR_ZONA_MASTER = data.daftarZona;
                    buatUlangListZona(DAFTAR_ZONA_MASTER);
                }
                
                if(data.daftarKondisi) data.daftarKondisi.forEach(k => selectKondisi.innerHTML += `<option value="${k}">${k}</option>`);
            })
            .catch(err => {
                console.log("Gagal sinkronisasi dropdown");
            });
            
            aktifkanSistemGeotaggingGPS();

            document.addEventListener("click", function(e) {
                if (!e.target.closest('.wadah-pencarian-kustom')) {
                    document.getElementById("boxHasilNama").style.display = "none";
                    document.getElementById("boxHasilZona").style.display = "none";
                }
            });
        });

        // ================= SEARCH LOGIC NAMA =================
        function buatUlangListNama(arrayNama) {
            const bNama = document.getElementById("boxHasilNama");
            bNama.innerHTML = "";
            if(arrayNama.length === 0) {
                bNama.innerHTML = `<div class="item-list-kustom tidak-ada">Nama tidak ditemukan...</div>`;
                return;
            }
            arrayNama.forEach(nama => {
                const div = document.createElement("div");
                div.className = "item-list-kustom";
                div.innerText = nama;
                div.onclick = function() {
                    document.getElementById("namaPetugasInput").value = nama;
                    bNama.style.display = "none";
                };
                bNama.appendChild(div);
            });
        }

        function filterNamaLive(kataKunci) {
            const kKunciLower = kataKunci.toLowerCase().trim();
            const hasilSaringan = DAFTAR_NAMA_MASTER.filter(nama => nama.toLowerCase().includes(kKunciLower));
            buatUlangListNama(hasilSaringan);
            document.getElementById("boxHasilNama").style.display = "block";
        }

        function tampilkanBoxNama() {
            document.getElementById("boxHasilZona").style.display = "none";
            const inp = document.getElementById("namaPetugasInput");
            if(inp.value !== "") {
                filterNamaLive(inp.value);
            } else {
                buatUlangListNama(DAFTAR_NAMA_MASTER);
                document.getElementById("boxHasilNama").style.display = "block";
            }
        }

        // ================= SEARCH LOGIC ZONA =================
        function buatUlangListZona(arrayZona) {
            const bZona = document.getElementById("boxHasilZona");
            bZona.innerHTML = "";
            if(arrayZona.length === 0) {
                bZona.innerHTML = `<div class="item-list-kustom tidak-ada">Zona tidak ditemukan...</div>`;
                return;
            }
            arrayZona.forEach(zona => {
                const div = document.createElement("div");
                div.className = "item-list-kustom";
                div.innerText = zona;
                div.onclick = function() {
                    document.getElementById("zonaAreaInput").value = zona;
                    bZona.style.display = "none";
                };
                bZona.appendChild(div);
            });
        }

        function filterZonaLive(kataKunci) {
            const kKunciLower = kataKunci.toLowerCase().trim();
            const hasilSaringan = DAFTAR_ZONA_MASTER.filter(zona => zona.toLowerCase().includes(kKunciLower));
            buatUlangListZona(hasilSaringan);
            document.getElementById("boxHasilZona").style.display = "block";
        }

        function tampilkanBoxZona() {
            document.getElementById("boxHasilNama").style.display = "none";
            const inp = document.getElementById("zonaAreaInput");
            if(inp.value !== "") {
                filterZonaLive(inp.value);
            } else {
                buatUlangListZona(DAFTAR_ZONA_MASTER);
                document.getElementById("boxHasilZona").style.display = "block";
            }
        }

        // ================= MEDIA & GEOLOCATION SYSTEMS =================
        function picuInputKameraHP() {
            document.getElementById('fileFoto').click();
        }

        function prosesPratinjauFoto(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('textTombolKamera').innerText = "Memproses Gambar...";
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        const MAX_WIDTH_HEIGHT = 1024;
                        if (width > height) {
                            if (width > MAX_WIDTH_HEIGHT) { height *= MAX_WIDTH_HEIGHT / width; width = MAX_WIDTH_HEIGHT; }
                        } else {
                            if (height > MAX_WIDTH_HEIGHT) { width *= MAX_WIDTH_HEIGHT / height; height = MAX_WIDTH_HEIGHT; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        GAMBAR_TERKOMPRES_BASE64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                        document.getElementById('imgTargetPreview').src = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('boxPreviewFoto').classList.remove('d-none');
                        document.getElementById('textTombolKamera').innerText = "Foto Berhasil Dilampirkan (Optimized)";
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function aktifkanSistemGeotaggingGPS() {
            const box = document.getElementById('gpsStatusBox');
            const icon = document.getElementById('gpsIcon');
            const text = document.getElementById('gpsTextStatus');
            const btnKirim = document.getElementById('btnSubmit');

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    window.latCoordinate = pos.coords.latitude;
                    window.lngCoordinate = pos.coords.longitude;
                    STATUS_GPS_VALID = true; 
                    box.className = "status-gps-box"; 
                    icon.className = "fa-solid fa-location-dot text-success";
                    text.innerText = "Lokasi GPS Berhasil Diotorisasi";
                    btnKirim.disabled = false;
                }, err => {
                    STATUS_GPS_VALID = false; 
                    box.className = "status-gps-box text-danger bg-danger bg-opacity-10 border-danger";
                    icon.className = "fa-solid fa-triangle-exclamation";
                    text.innerText = "Izin GPS Diperlukan Lapangan!";
                    btnKirim.disabled = false; 
                }, { enableHighAccuracy: true });
            } else {
                STATUS_GPS_VALID = false; text.innerText = "Gps Tidak Didukung Browser"; btnKirim.disabled = false;
            }
        }

        // ================= SUBMIT FORM & SINKRONISASI API =================
        document.getElementById('formPatroli').addEventListener('submit', function(e) {
            e.preventDefault();
            const nilaiNamaKetik = document.getElementById('namaPetugasInput').value.trim();
            const nilaiZonaKetik = document.getElementById('zonaAreaInput').value.trim();
            const nilaiCatatan = document.getElementById('catatanPetugas').value.trim();
            const fileKomponen = document.getElementById('fileFoto').files[0];

            if(DAFTAR_NAMA_MASTER.length > 0 && !DAFTAR_NAMA_MASTER.includes(nilaiNamaKetik)) {
                Swal.fire({ icon: 'warning', title: 'Personel Tidak Valid', text: 'Nama Anda tidak terdaftar di database.', confirmButtonColor: '#0b132b' });
                return;
            }

            if(DAFTAR_ZONA_MASTER.length > 0 && !DAFTAR_ZONA_MASTER.includes(nilaiZonaKetik)) {
                Swal.fire({ icon: 'warning', title: 'Zona Tidak Valid', text: 'Nama Zona/Sektor tidak cocok dengan database Mall 23Semarang.', confirmButtonColor: '#0b132b' });
                return;
            }
            
            if (!STATUS_GPS_VALID || !window.latCoordinate || !window.lngCoordinate) {
                Swal.fire({ icon: 'error', title: 'Akses Kirim Ditolak!', text: 'Aktifkan GPS perangkat Anda dan berikan izin lokasi browser.', confirmButtonColor: '#d33', confirmButtonText: 'Aktifkan GPS & Refresh' })
                .then((result) => { if (result.isConfirmed) location.reload(); });
                return;
            }

            if(!fileKomponen || !GAMBAR_TERKOMPRES_BASE64) {
                Swal.fire({ icon: 'warning', title: 'Dokumentasi Wajib', text: 'Anda wajib melampirkan foto bukti fisik area sebelum mengirim laporan.', confirmButtonColor: '#0b132b' });
                return;
            }

            Swal.fire({ title: 'Mengamankan Data Laporan', text: 'Menyinkronkan data GPS dan laporan log ke server pusat...', allowOutsideClick: false, allowEscapeKey: false, showConfirmButton: false, didOpen: () => { Swal.showLoading(); } });

            const paketKirim = {
                aksi: "simpanData",
                payload: {
                    nama: nilaiNamaKetik,
                    zona: nilaiZonaKetik,
                    kondisi: document.getElementById('kondisiSektor').value,
                    catatan: nilaiCatatan, // DATA BARU YANG DIKIRIM KE GOOGLE SCRIPT
                    fotoBase64: GAMBAR_TERKOMPRES_BASE64,
                    fotoMime: "image/jpeg",
                    lat: window.latCoordinate,
                    lng: window.lngCoordinate
                }
            };

            fetch(API_URL_WEBAPP, { method: "POST", body: JSON.stringify(paketKirim) })
            .then(res => res.json())
            .then(hasil => {
                if(hasil.status === "SUCCESS") {
                    Swal.fire({ icon: 'success', title: 'Laporan Disinkronisasi', text: 'Log patroli lapangan Anda berhasil dicatat secara real-time.', confirmButtonColor: '#0b132b', allowOutsideClick: false })
                    .then((result) => { if (result.isConfirmed) location.reload(); });
                } else {
                    Swal.fire({ icon: 'error', title: 'Sinkronisasi Gagal', text: 'Server menolak laporan data: ' + hasil.message, confirmButtonColor: '#d33' });
                }
            })
            .catch(err => {
                Swal.fire({ icon: 'error', title: 'Gangguan Jaringan', text: 'Gagal menghubungi server utama. Periksa kembali sinyal internet Anda.', confirmButtonColor: '#d33' });
            });
        });
    </script>
</body>
</html>
